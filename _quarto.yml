project:
  type: website

website:
  title: "Ridgway Math Resources"
  search: true

  # --- TOP NAVIGATION (The Class Selector) ---
  navbar:
    background: primary
    left:
      - text: "Home"
        file: index.qmd
      - text: "AP Calculus AB"
        file: AP-Calculus-AB/index.qmd

  # --- SIDE NAVIGATION (Course-Specific Materials) ---
  sidebar:
    - id: calculus
      title: "AP Calculus AB"
      style: "floating"
      contents:
        - AP-Calculus-AB/index.qmd
        
        - section: "Printable Textbook (PDF)"
          contents:
            - AP-Calculus-AB/textbook-pdf/Chapter-1/Chapter1.qmd
            - AP-Calculus-AB/textbook-pdf/Chapter-2/Chapter2.qmd
            - AP-Calculus-AB/textbook-pdf/Chapter-3/Chapter3.qmd
            - AP-Calculus-AB/textbook-pdf/Chapter-4/Chapter4.qmd
            - AP-Calculus-AB/textbook-pdf/Chapter-5/Chapter5.qmd
            - AP-Calculus-AB/textbook-pdf/Chapter-6/Chapter6.qmd
            - AP-Calculus-AB/textbook-pdf/Chapter-7/Chapter7.qmd

        - section: "Interactive Textbook"
          contents:
            - AP-Calculus-AB/interactive-text/index.qmd
            # We will drop your Euler's Method chapter in here next!

format:
  html:
    theme: 
      light: [cosmo, custom.scss]
      dark: [darkly, custom.scss]
    toc: true
    html-math-method: mathjax