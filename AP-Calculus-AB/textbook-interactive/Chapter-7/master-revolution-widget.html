<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solid of Revolution Widget</title>
<script src="https://cdn.plot.ly/plotly-2.26.0.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #fff; color: #222; }

  .widget {
    width: 100%;
    max-width: 800px;
    margin: 0 auto;
    padding: 1rem;
  }

  .plot-area {
    width: 100%;
    height: 460px;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    overflow: hidden;
  }

  .controls {
    margin-top: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .slider-label {
    font-size: 14px;
    color: #555;
    min-width: 220px;
  }

  input[type="range"] {
    flex: 1;
    height: 4px;
    accent-color: #2563eb;
    cursor: pointer;
  }

  .slider-value {
    font-size: 14px;
    font-weight: 500;
    min-width: 60px;
    text-align: right;
    color: #222;
  }

  .caption {
    font-size: 13px;
    color: #666;
    margin-top: 0.5rem;
    font-style: italic;
  }

  .btn-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  button {
    font-size: 13px;
    padding: 6px 14px;
    border: 1px solid #ccc;
    border-radius: 6px;
    background: #f8f8f8;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover { background: #e8e8e8; }
  button.active { background: #2563eb; color: #fff; border-color: #2563eb; }
</style>
</head>
<body>

<!--
  ========================================================
  CONFIGURATION — edit this block to change the example
  ========================================================
  
  To embed in Quarto, wrap this entire file in:
  
    ```{=html}
    <iframe src="revolution-widget.html" width="100%" height="600"
            style="border:none;"></iframe>
    ```
  
  Or paste the body content (minus DOCTYPE/html/head/body tags)
  directly into a ```{=html} block.
  
  CONFIG OPTIONS:
    title        — plot title (LaTeX not supported in Plotly title)
    f            — outer function f(x) as JS function
    g            — inner function g(x) for washer method (null = disk method)
    a, b         — x integration limits
    axisLabel    — shown in caption
    xRange, yRange, zRange — axis display ranges
    aspectRatio  — {x, y, z} for scene
    stepsX       — resolution along x (higher = smoother, slower)
    stepsTheta   — resolution around angle (higher = smoother, slower)
    surfaceColor — Plotly colorscale name for the surface
    outerColor   — color of the outer curve line
    innerColor   — color of the inner curve line (washer only)
    defaultCamera — eye/center/up for initial view
-->
<script>
const CONFIGS = {

  // ── Example 1: Disk method — f(x) = √(sin x) ──────────────────────────────
  "sqrt_sinx": {
    title: "f(x) = √(sin x)  revolved about x-axis",
    f: x => Math.sqrt(Math.sin(x)),
    g: null,
    a: 0, b: Math.PI,
    axisLabel: "f(x) = √(sin x),  x ∈ [0, π]",
    xRange: [-0.3, 3.5], yRange: [-1.3, 1.3], zRange: [-1.2, 1.2],
    aspectRatio: { x: 1.5, y: 1, z: 0.67 },
    stepsX: 60, stepsTheta: 40,
    surfaceColor: "Blues",
    outerColor: "red",
    innerColor: null,
    defaultCamera: {
      eye:    { x: 0.005, y: 0.25,  z: -2.00 },
      center: { x: 0.005, y: -0.067, z: -0.014 },
      up:     { x: 0,     y: 0,     z: 1     }
    }
  },

  // ── Example 2: Disk method — f(x) = x² ────────────────────────────────────
  "x_squared": {
    title: "f(x) = x²  revolved about x-axis",
    f: x => x * x,
    g: null,
    a: 0, b: 2,
    axisLabel: "f(x) = x²,  x ∈ [0, 2]",
    xRange: [-0.3, 2.5], yRange: [-4.5, 4.5], zRange: [-4, 4],
    aspectRatio: { x: 1.2, y: 1, z: 1 },
    stepsX: 60, stepsTheta: 40,
    surfaceColor: "Greens",
    outerColor: "crimson",
    innerColor: null,
    defaultCamera: {
      eye:    { x: 1.5, y: 1.5, z: 0.8 },
      center: { x: 0,   y: 0,   z: 0   },
      up:     { x: 0,   y: 0,   z: 1   }
    }
  },

  // ── Example 3: Washer method — f(x)=√x, g(x)=x² ─────────────────────────
  "sqrt_x_vs_x2": {
    title: "Washer: R(x)=√x, r(x)=x²  revolved about x-axis",
    f: x => Math.sqrt(x),
    g: x => x * x,
    a: 0, b: 1,
    axisLabel: "R(x) = √x (outer),  r(x) = x² (inner),  x ∈ [0, 1]",
    xRange: [-0.2, 1.4], yRange: [-1.2, 1.2], zRange: [-1, 1],
    aspectRatio: { x: 1.2, y: 1, z: 0.83 },
    stepsX: 60, stepsTheta: 40,
    surfaceColor: "Oranges",
    outerColor: "#1d6fe8",
    innerColor: "#e83d1d",
    defaultCamera: {
      eye:    { x: 1.5, y: 1.5, z: 0.8 },
      center: { x: 0,   y: 0,   z: 0   },
      up:     { x: 0,   y: 0,   z: 1   }
    }
  },

  // ── Example 4: Washer method — f(x)=2−x², g(x)=1 ─────────────────────────
  "parabola_washer": {
    title: "Washer: R(x)=2−x², r(x)=1  revolved about y=1",
    f: x => (2 - x * x) - 1,
    g: x => 0,
    a: -1, b: 1,
    axisLabel: "Outer: 2−x²−1,  inner: 0 (shifted so y=1 is axis)",
    xRange: [-1.5, 1.5], yRange: [-1.2, 1.2], zRange: [-1, 1],
    aspectRatio: { x: 1.2, y: 1, z: 0.83 },
    stepsX: 60, stepsTheta: 40,
    surfaceColor: "RdPu",
    outerColor: "#0f6e56",
    innerColor: null,
    defaultCamera: {
      eye:    { x: 1.5, y: 1.5, z: 0.8 },
      center: { x: 0,   y: 0,   z: 0   },
      up:     { x: 0,   y: 0,   z: 1   }
    }
  }

};
</script>

<div class="widget">

  <div class="btn-row" id="example-btns" style="margin-bottom:1rem;"></div>

  <div id="plot" class="plot-area"></div>

  <div class="controls">
    <div class="slider-row">
      <span class="slider-label">Angle of revolution (radians):</span>
      <input type="range" id="angle-slider" min="0.05" max="6.2832" step="0.01" value="0.05">
      <span class="slider-value" id="angle-display">0.05</span>
    </div>
    <div class="caption" id="fn-caption"></div>
  </div>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let currentConfig = CONFIGS["sqrt_sinx"];
let currentAngle  = 0.05;
let plotDiv       = document.getElementById("plot");
let animFrame     = null;
let pendingAngle  = null;
let plotReady     = false;
let savedCamera   = null;

// ─── Build example selector buttons ──────────────────────────────────────────
const btnContainer = document.getElementById("example-btns");
const labels = {
  "sqrt_sinx":      "√(sin x)",
  "x_squared":      "x²",
  "sqrt_x_vs_x2":   "Washer: √x & x²",
  "parabola_washer":"Washer: 2−x²"
};
Object.keys(CONFIGS).forEach(key => {
  const b = document.createElement("button");
  b.textContent = labels[key];
  b.dataset.key = key;
  if (key === "sqrt_sinx") b.classList.add("active");
  b.onclick = () => {
    document.querySelectorAll("#example-btns button").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    currentConfig = CONFIGS[key];
    savedCamera   = null;
    currentAngle  = 0.05;
    document.getElementById("angle-slider").value = 0.05;
    document.getElementById("angle-display").textContent = "0.05";
    document.getElementById("fn-caption").textContent = currentConfig.axisLabel;
    initPlot();
  };
  btnContainer.appendChild(b);
});

// ─── Geometry builders ────────────────────────────────────────────────────────
function buildTraces(cfg, angle) {
  const { f, g, a, b, stepsX, stepsTheta, surfaceColor, outerColor, innerColor } = cfg;
  const traces = [];

  // Outer surface (disk or washer outer wall)
  {
    const xVals = [], yVals = [], zVals = [];
    for (let i = 0; i <= stepsTheta; i++) {
      const theta = (i / stepsTheta) * angle;
      const xRow = [], yRow = [], zRow = [];
      for (let j = 0; j <= stepsX; j++) {
        const x = a + (j / stepsX) * (b - a);
        const r = f(x);
        xRow.push(x);
        yRow.push(r * Math.cos(theta));
        zRow.push(r * Math.sin(theta));
      }
      xVals.push(xRow); yVals.push(yRow); zVals.push(zRow);
    }
    traces.push({
      x: xVals, y: yVals, z: zVals,
      type: "surface",
      colorscale: surfaceColor,
      showscale: false,
      opacity: 0.85,
      hoverinfo: "skip"
    });
  }

  // Inner surface (washer inner wall) — only if g is provided
  if (g) {
    const xVals = [], yVals = [], zVals = [];
    for (let i = 0; i <= stepsTheta; i++) {
      const theta = (i / stepsTheta) * angle;
      const xRow = [], yRow = [], zRow = [];
      for (let j = 0; j <= stepsX; j++) {
        const x = a + (j / stepsX) * (b - a);
        const r = g(x);
        xRow.push(x);
        yRow.push(r * Math.cos(theta));
        zRow.push(r * Math.sin(theta));
      }
      xVals.push(xRow); yVals.push(yRow); zVals.push(zRow);
    }
    traces.push({
      x: xVals, y: yVals, z: zVals,
      type: "surface",
      colorscale: "Greys",
      showscale: false,
      opacity: 0.55,
      hoverinfo: "skip"
    });
  }

  // End caps (filled circle/annulus at the swept edge, when < full revolution)
  if (angle < 2 * Math.PI - 0.05) {
    const capX = [], capY = [], capZ = [];
    for (let j = 0; j <= stepsX; j++) {
      const x = a + (j / stepsX) * (b - a);
      const rOuter = f(x);
      const rInner = g ? g(x) : 0;
      for (let k = 0; k <= 12; k++) {
        const r = rInner + (k / 12) * (rOuter - rInner);
        capX.push(x);
        capY.push(r * Math.cos(angle));
        capZ.push(r * Math.sin(angle));
      }
    }
    traces.push({
      x: capX, y: capY, z: capZ,
      type: "scatter3d",
      mode: "markers",
      marker: { size: 1.8, color: "#aaaaaa", opacity: 0.4 },
      hoverinfo: "skip"
    });
  }

  // Outer curve line (red by default)
  {
    const lineX = [], lineY = [], lineZ = [];
    for (let j = 0; j <= stepsX; j++) {
      const x = a + (j / stepsX) * (b - a);
      lineX.push(x); lineY.push(f(x)); lineZ.push(0);
    }
    traces.push({
      x: lineX, y: lineY, z: lineZ,
      type: "scatter3d", mode: "lines",
      line: { color: outerColor, width: 5 },
      hoverinfo: "skip"
    });
  }

  // Inner curve line (washer only)
  if (g && innerColor) {
    const lineX = [], lineY = [], lineZ = [];
    for (let j = 0; j <= stepsX; j++) {
      const x = a + (j / stepsX) * (b - a);
      lineX.push(x); lineY.push(g(x)); lineZ.push(0);
    }
    traces.push({
      x: lineX, y: lineY, z: lineZ,
      type: "scatter3d", mode: "lines",
      line: { color: innerColor, width: 5 },
      hoverinfo: "skip"
    });
  }

  return traces;
}

// ─── Layout builder ───────────────────────────────────────────────────────────
function buildLayout(cfg) {
  const camera = savedCamera || cfg.defaultCamera;
  return {
    title: { text: cfg.title, font: { size: 13 } },
    scene: {
      xaxis: { title: "x", range: cfg.xRange },
      yaxis: { title: "y", range: cfg.yRange },
      zaxis: { title: "z", range: cfg.zRange },
      aspectmode: "manual",
      aspectratio: cfg.aspectRatio,
      camera
    },
    margin: { l: 0, r: 0, b: 0, t: 36 },
    showlegend: false,
    paper_bgcolor: "rgba(0,0,0,0)",
    plot_bgcolor:  "rgba(0,0,0,0)"
  };
}

// ─── Init (first draw) ────────────────────────────────────────────────────────
function initPlot() {
  plotReady = false;
  Plotly.newPlot(plotDiv, buildTraces(currentConfig, currentAngle), buildLayout(currentConfig), {
    responsive: true,
    displayModeBar: true,
    modeBarButtonsToRemove: ["toImage", "sendDataToCloud"],
    scrollZoom: true
  }).then(() => {
    plotReady = true;
    // Save camera whenever the user rotates/zooms
    plotDiv.on("plotly_relayout", evt => {
      const c = plotDiv._fullLayout?.scene?.camera;
      if (c) savedCamera = JSON.parse(JSON.stringify(c));
    });
  });
  document.getElementById("fn-caption").textContent = currentConfig.axisLabel;
}

// ─── Smooth slider update (RAF-throttled) ─────────────────────────────────────
function scheduleUpdate(angle) {
  pendingAngle = angle;
  if (animFrame) return;
  animFrame = requestAnimationFrame(() => {
    animFrame = null;
    if (!plotReady) return;
    const a = pendingAngle;
    pendingAngle = null;
    // Preserve camera
    const camera = plotDiv._fullLayout?.scene?.camera || currentConfig.defaultCamera;
    savedCamera  = JSON.parse(JSON.stringify(camera));
    const layout = buildLayout(currentConfig);
    Plotly.react(plotDiv, buildTraces(currentConfig, a), layout, { responsive: true });
  });
}

// ─── Slider event ─────────────────────────────────────────────────────────────
const slider  = document.getElementById("angle-slider");
const display = document.getElementById("angle-display");

slider.addEventListener("input", e => {
  currentAngle = parseFloat(e.target.value);
  display.textContent = currentAngle.toFixed(2);
  scheduleUpdate(currentAngle);
});

// ─── Boot ─────────────────────────────────────────────────────────────────────
initPlot();
</script>
</body>
</html>
