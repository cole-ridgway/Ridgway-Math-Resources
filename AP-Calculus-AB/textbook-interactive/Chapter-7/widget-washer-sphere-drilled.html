<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Washer Method: Sphere with Drilled Hole</title>
<script src="https://cdn.plot.ly/plotly-2.26.0.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #fff; color: #222; }
  .widget { width: 100%; max-width: 800px; margin: 0 auto; padding: 1rem; }
  .plot-area { width: 100%; height: 460px; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; }
  .controls { margin-top: 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
  .slider-row { display: flex; align-items: center; gap: 12px; }
  .slider-label { font-size: 14px; color: #555; min-width: 220px; }
  input[type="range"] { flex: 1; height: 4px; accent-color: #2563eb; cursor: pointer; }
  .slider-value { font-size: 14px; font-weight: 500; min-width: 60px; text-align: right; color: #222; }
  .caption { font-size: 13px; color: #666; margin-top: 0.5rem; font-style: italic; }
</style>
</head>
<body>

<script>
const cfg = {
  title: "Washer: R(x) = √(25−x²) (outer),  r(x) = 3 (inner),  about x-axis",
  f: x => Math.sqrt(25 - x * x),   // outer radius: arc of the sphere
  g: x => 3,                        // inner radius: the drilled hole
  axisY: 0,
  a: -4, b: 4,
  axisLabel: "R(x) = √(25−x²),  r(x) = 3,  x ∈ [−4, 4]",
  xRange: [-5, 5], yRange: [-5.5, 5.5], zRange: [-5, 5],
  aspectRatio: { x: 1, y: 1, z: 1 },
  stepsX: 60, stepsTheta: 40,
  surfaceColor: "Blues",
  outerColor: "#1d6fe8",
  innerColor: "#e83d1d",
  defaultCamera: {
    eye:    {x: 0.45, y: -0.14, z: -2.14},
    center: { x: 0,   y: 0,   z: 0   },
    up:     {x: -0.02, y: -1, z: 0.06}
  },
  axisLineLength: 5.2,   // set to roughly match your xRange/yRange/zRange extents
  showGrid: true,
  gridMin: -5.5,    // should match roughly your xRange/yRange lower bound
  gridMax: 5.5,     // should match roughly your xRange/yRange upper bound
  gridSteps: 12,    // number of grid squares — 8–12 looks clean
};
</script>

<div class="widget">
  <div id="plot" class="plot-area"></div>
  <div class="controls">
    <div class="slider-row">
      <span class="slider-label">Angle of revolution (radians):</span>
      <input type="range" id="angle-slider" min="0.05" max="6.2832" step="0.01" value="0.05">
      <span class="slider-value" id="angle-display">0.05</span>
    </div>
    <div class="caption" id="fn-caption"></div>
  </div>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let currentAngle = 0.05;
let plotDiv      = document.getElementById("plot");
let animFrame    = null;
let pendingAngle = null;
let plotReady    = false;
let savedCamera  = null;

// ─── Geometry builder ─────────────────────────────────────────────────────────
function buildTraces(angle) {
  const { f, g, a, b, stepsX, stepsTheta, surfaceColor, outerColor, innerColor, axisY } = cfg;
  const traces = [];

  // Outer surface
  {
    const xVals = [], yVals = [], zVals = [];
    for (let i = 0; i <= stepsTheta; i++) {
      const theta = (i / stepsTheta) * angle;
      const xRow = [], yRow = [], zRow = [];
      for (let j = 0; j <= stepsX; j++) {
        const x = a + (j / stepsX) * (b - a);
        const r = f(x);
        xRow.push(x);
        yRow.push(axisY + r * Math.cos(theta));
        zRow.push(r * Math.sin(theta));
      }
      xVals.push(xRow); yVals.push(yRow); zVals.push(zRow);
    }
    traces.push({
      x: xVals, y: yVals, z: zVals,
      type: "surface", colorscale: surfaceColor,
      showscale: false, opacity: 0.85, hoverinfo: "skip"
    });
  }

  // Inner surface (the cylindrical hole, radius 3)
  {
    const xVals = [], yVals = [], zVals = [];
    for (let i = 0; i <= stepsTheta; i++) {
      const theta = (i / stepsTheta) * angle;
      const xRow = [], yRow = [], zRow = [];
      for (let j = 0; j <= stepsX; j++) {
        const x = a + (j / stepsX) * (b - a);
        const r = g(x);
        xRow.push(x);
        yRow.push(axisY + r * Math.cos(theta));
        zRow.push(r * Math.sin(theta));
      }
      xVals.push(xRow); yVals.push(yRow); zVals.push(zRow);
    }
    traces.push({
      x: xVals, y: yVals, z: zVals,
      type: "surface", colorscale: "Greys",
      showscale: false, opacity: 0.6, hoverinfo: "skip"
    });
  }

  // End cap
  if (angle < 2 * Math.PI - 0.05) {
    const capX = [], capY = [], capZ = [];
    for (let j = 0; j <= stepsX; j++) {
      const x = a + (j / stepsX) * (b - a);
      const rOuter = f(x);
      const rInner = g(x);
      for (let k = 0; k <= 12; k++) {
        const r = rInner + (k / 12) * (rOuter - rInner);
        capX.push(x);
        capY.push(axisY + r * Math.cos(angle));
        capZ.push(r * Math.sin(angle));
      }
    }
    traces.push({
      x: capX, y: capY, z: capZ,
      type: "scatter3d", mode: "markers",
      marker: { size: 1.8, color: "#aaaaaa", opacity: 0.4 },
      hoverinfo: "skip"
    });
  }

  // Outer curve line: R(x) = √(25 - x²)
  {
    const lineX = [], lineY = [], lineZ = [];
    for (let j = 0; j <= stepsX; j++) {
      const x = a + (j / stepsX) * (b - a);
      lineX.push(x); lineY.push(axisY + f(x)); lineZ.push(0);
    }
    traces.push({
      x: lineX, y: lineY, z: lineZ,
      type: "scatter3d", mode: "lines",
      line: { color: outerColor, width: 5 }, hoverinfo: "skip"
    });
  }

  // Inner curve line: r(x) = 3 (constant, the hole radius)
  {
    const lineX = [], lineY = [], lineZ = [];
    for (let j = 0; j <= stepsX; j++) {
      const x = a + (j / stepsX) * (b - a);
      lineX.push(x); lineY.push(axisY + g(x)); lineZ.push(0);
    }
    traces.push({
      x: lineX, y: lineY, z: lineZ,
      type: "scatter3d", mode: "lines",
      line: { color: innerColor, width: 5 }, hoverinfo: "skip"
    });
  }
    // ─── x-y grid plane ───────────────────────────────────────────────────────────
    if (cfg.showGrid) {
    const { gridMin, gridMax, gridSteps } = cfg;
    const xVals = [], yVals = [], zVals = [];
    for (let i = 0; i <= gridSteps; i++) {
        const row_x = [], row_y = [], row_z = [];
        const x = gridMin + (i / gridSteps) * (gridMax - gridMin);
        for (let j = 0; j <= gridSteps; j++) {
        const y = gridMin + (j / gridSteps) * (gridMax - gridMin);
        row_x.push(x);
        row_y.push(y);
        row_z.push(0);
        }
        xVals.push(row_x); yVals.push(row_y); zVals.push(row_z);
    }
    traces.push({
        x: xVals, y: yVals, z: zVals,
        type: "surface",
        colorscale: [[0, "#e8e8e8"], [1, "#e8e8e8"]],
        showscale: false,
        opacity: 0.5,
        hoverinfo: "skip",
        hidesurface: false,
        contours: {
        x: { show: true, color: "#aaaaaa", width: 1 },
        y: { show: true, color: "#aaaaaa", width: 1 },
        z: { show: false }
        }
    });
    }

  // ─── Axis lines ───────────────────────────────────────────────────────────────
  const axisLen = cfg.axisLineLength;
  const axes = [
    { x: [-axisLen, axisLen], y: [0, 0], z: [0, 0] },  // x-axis
    { x: [0, 0], y: [-axisLen, axisLen], z: [0, 0] },  // y-axis
    { x: [0, 0], y: [0, 0], z: [-axisLen, axisLen] },  // z-axis
  ];
  for (const ax of axes) {
    traces.push({
      x: ax.x, y: ax.y, z: ax.z,
      type: "scatter3d", mode: "lines",
      line: { color: "#333333", width: 3 },
      hoverinfo: "skip"
    });
  }

  return traces;
}

// ─── Layout builder ───────────────────────────────────────────────────────────
function buildLayout() {
  return {
    title: { text: cfg.title, font: { size: 13 } },
    uirevision: 1,
    scene: {
      xaxis: { title: "x", range: cfg.xRange },
      yaxis: { title: "y", range: cfg.yRange },
      zaxis: { title: "z", range: cfg.zRange },
      aspectmode: "manual",
      aspectratio: cfg.aspectRatio,
      camera: savedCamera || cfg.defaultCamera
    },
    margin: { l: 0, r: 0, b: 0, t: 36 },
    showlegend: false,
    paper_bgcolor: "rgba(0,0,0,0)",
    plot_bgcolor:  "rgba(0,0,0,0)"
  };
}

// ─── Init ─────────────────────────────────────────────────────────────────────
function initPlot() {
  plotReady = false;
  Plotly.newPlot(plotDiv, buildTraces(currentAngle), buildLayout(), {
    responsive: true, displayModeBar: true,
    modeBarButtonsToRemove: ["toImage", "sendDataToCloud"],
    scrollZoom: true
  }).then(() => {
    plotReady = true;
    plotDiv.on("plotly_relayout", () => {
      const c = plotDiv._fullLayout?.scene?.camera;
      if (c) savedCamera = JSON.parse(JSON.stringify(c));
    });
  });
  document.getElementById("fn-caption").textContent = cfg.axisLabel;
}

// ─── RAF-throttled update ─────────────────────────────────────────────────────
function scheduleUpdate(angle) {
  pendingAngle = angle;
  if (animFrame) return;
  animFrame = requestAnimationFrame(() => {
    animFrame = null;
    if (!plotReady) return;
    const a = pendingAngle;
    pendingAngle = null;
    const c = plotDiv._fullLayout?.scene?.camera || cfg.defaultCamera;
    savedCamera = JSON.parse(JSON.stringify(c));
    Plotly.react(plotDiv, buildTraces(a), buildLayout(), { responsive: true });
  });
}

// ─── Slider ───────────────────────────────────────────────────────────────────
const slider  = document.getElementById("angle-slider");
const display = document.getElementById("angle-display");
slider.addEventListener("input", e => {
  currentAngle = parseFloat(e.target.value);
  display.textContent = currentAngle.toFixed(2);
  scheduleUpdate(currentAngle);
});

initPlot();
</script>
</body>
</html>
