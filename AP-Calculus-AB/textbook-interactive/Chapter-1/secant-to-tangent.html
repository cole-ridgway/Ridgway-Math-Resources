<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secant to Tangent Line Explorer</title>
    <style>
        body {
            font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f8f9fa;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 700px;
            width: 100%;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-top: 0;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border: 1px solid #e0e0e0;
            background-color: #ffffff;
            cursor: crosshair;
        }
        .controls {
            margin-top: 20px;
            padding: 15px;
            background: #f1f3f5;
            border-radius: 6px;
        }
        .slider-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        input[type="range"] {
            flex-grow: 1;
            margin: 0 15px;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
            font-size: 1.1em;
        }
        .math-text {
            font-style: italic;
        }
        .secant-color { color: #3498db; font-weight: bold; }
        .tangent-color { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>The Tangent Line Problem</h2>
    <canvas id="graphCanvas" width="600" height="400"></canvas>
    
    <div class="controls">
        <div class="slider-group">
            <label for="deltaXSlider">Horizontal Separation (<span class="math-text">&Delta;x</span>):</label>
            <input type="range" id="deltaXSlider" min="0.01" max="2.0" step="0.01" value="1.0">
            <span id="deltaXValue">1.00</span>
        </div>
        
        <div class="stats">
            <div>Secant Slope (<span class="math-text">m<sub>sec</sub></span>): <span id="secantSlope" class="secant-color">1.50</span></div>
            <div>Tangent Slope (<span class="math-text">m<sub>tan</sub></span>): <span id="tangentSlope" class="tangent-color">1.00</span></div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('graphCanvas');
    const ctx = canvas.getContext('2d');
    const slider = document.getElementById('deltaXSlider');
    const deltaXDisplay = document.getElementById('deltaXValue');
    const secantDisplay = document.getElementById('secantSlope');

    // Math setup
    const f = (x) => (x * x) / 2;
    const c = 1; // x-coordinate of point P
    const y_c = f(c); // y-coordinate of point P
    const m_tan = c; // Derivative of x^2/2 is x, so at x=c, slope is c.

    // Canvas scaling and origin mapping
    // We want to show x from -1 to 3.5, y from -1 to 5
    const xMin = -1, xMax = 3.5;
    const yMin = -1, yMax = 5;
    
    function mapX(x) {
        return ((x - xMin) / (xMax - xMin)) * canvas.width;
    }
    
    function mapY(y) {
        return canvas.height - ((y - yMin) / (yMax - yMin)) * canvas.height;
    }

    function drawGraph() {
        const deltaX = parseFloat(slider.value);
        const x_q = c + deltaX;
        const y_q = f(x_q);
        const m_sec = (y_q - y_c) / deltaX;

        // Update HTML text
        deltaXDisplay.innerText = deltaX.toFixed(2);
        secantDisplay.innerText = m_sec.toFixed(2);

        // Clear canvas
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. Draw Axes
        ctx.beginPath();
        ctx.strokeStyle = '#aaaaaa';
        ctx.lineWidth = 1;
        // x-axis
        ctx.moveTo(0, mapY(0));
        ctx.lineTo(canvas.width, mapY(0));
        // y-axis
        ctx.moveTo(mapX(0), 0);
        ctx.lineTo(mapX(0), canvas.height);
        ctx.stroke();

        // 2. Draw Tangent Line (Pink/Red)
        ctx.beginPath();
        ctx.strokeStyle = '#fadbd8'; // Light red/pink
        ctx.lineWidth = 3;
        const tY1 = m_tan * (xMin - c) + y_c;
        const tY2 = m_tan * (xMax - c) + y_c;
        ctx.moveTo(mapX(xMin), mapY(tY1));
        ctx.lineTo(mapX(xMax), mapY(tY2));
        ctx.stroke();
        
        // 3. Draw Secant Line (Blue)
        ctx.beginPath();
        ctx.strokeStyle = '#85c1e9'; // Light blue
        ctx.lineWidth = 2;
        const sY1 = m_sec * (xMin - c) + y_c;
        const sY2 = m_sec * (xMax - c) + y_c;
        ctx.moveTo(mapX(xMin), mapY(sY1));
        ctx.lineTo(mapX(xMax), mapY(sY2));
        ctx.stroke();

        // 4. Draw Function Curve (Black Parabola)
        ctx.beginPath();
        ctx.strokeStyle = '#212121';
        ctx.lineWidth = 2.5;
        for (let px = 0; px <= canvas.width; px++) {
            let x = xMin + (px / canvas.width) * (xMax - xMin);
            let y = f(x);
            if (px === 0) ctx.moveTo(mapX(x), mapY(y));
            else ctx.lineTo(mapX(x), mapY(y));
        }
        ctx.stroke();

        // 5. Draw Delta x and Delta y dashed lines
        ctx.beginPath();
        ctx.setLineDash([5, 5]); // Dashed line pattern
        ctx.strokeStyle = '#d35400';
        ctx.lineWidth = 1.5;
        // Horizontal (Delta x)
        ctx.moveTo(mapX(c), mapY(y_c));
        ctx.lineTo(mapX(x_q), mapY(y_c));
        // Vertical (Delta y)
        ctx.moveTo(mapX(x_q), mapY(y_c));
        ctx.lineTo(mapX(x_q), mapY(y_q));
        ctx.stroke();
        ctx.setLineDash([]); // Reset to solid line

        // 6. Draw Points P and Q
        ctx.fillStyle = 'black';
        // Point P
        ctx.beginPath();
        ctx.arc(mapX(c), mapY(y_c), 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.font = 'italic 16px serif';
        ctx.fillText('P', mapX(c) - 20, mapY(y_c) - 10);

        // Point Q
        ctx.beginPath();
        ctx.arc(mapX(x_q), mapY(y_q), 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillText('Q', mapX(x_q) - 20, mapY(y_q) - 10);
    }

    // Event listener for the slider
    slider.addEventListener('input', drawGraph);

    // Initial draw
    drawGraph();
</script>

</body>
</html>
